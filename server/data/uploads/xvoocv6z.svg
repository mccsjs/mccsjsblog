<svg width="1000" height="550" xmlns="http://www.w3.org/2000/svg">
<style>
text{
font-family:"Microsoft YaHei","PingFang SC",sans-serif;
fill:#333;
}
.title{
font-size:30px;
font-weight:bold;
}
.node{
fill:white;
stroke:#333;
stroke-width:2;
rx:10;
}
</style>

<text x="250" y="60" class="title">DeepSeek</text>
<text x="750" y="60" class="title">Agent</text>

<rect class="node" x="170" y="100" width="160" height="60"/>
<rect class="node" x="170" y="220" width="160" height="60"/>
<rect class="node" x="170" y="340" width="160" height="60"/>

<text x="250" y="138" text-anchor="middle">提问</text>
<text x="250" y="258" text-anchor="middle">回答</text>
<text x="250" y="378" text-anchor="middle">结束</text>

<line x1="250" y1="160" x2="250" y2="220" stroke="#333"/>
<line x1="250" y1="280" x2="250" y2="340" stroke="#333"/>

<rect class="node" x="670" y="100" width="160" height="60"/>
<rect class="node" x="670" y="190" width="160" height="60"/>
<rect class="node" x="670" y="280" width="160" height="60"/>
<rect class="node" x="670" y="370" width="160" height="60"/>

<text x="750" y="138" text-anchor="middle">目标</text>
<text x="750" y="228" text-anchor="middle">制定计划</text>
<text x="750" y="318" text-anchor="middle">调用工具</text>
<text x="750" y="408" text-anchor="middle">完成任务</text>

<line x1="750" y1="160" x2="750" y2="190" stroke="#333"/>
<line x1="750" y1="250" x2="750" y2="280" stroke="#333"/>
<line x1="750" y1="340" x2="750" y2="370" stroke="#333"/>
</svg>