<svg width="1200" height="260" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style>
      .title{
        font-family:"PingFang SC","Microsoft YaHei",sans-serif;
        font-size:30px;
        font-weight:bold;
        fill:#333;
      }

      .box{
        fill:#fff;
        stroke:#333;
        stroke-width:2;
        rx:12;
      }

      .text{
        font-family:"PingFang SC","Microsoft YaHei",sans-serif;
        font-size:18px;
        fill:#333;
        text-anchor:middle;
        dominant-baseline:middle;
      }

      .line{
        stroke:#666;
        stroke-width:2;
      }
    </style>

    <marker id="arrow"
            markerWidth="10"
            markerHeight="10"
            refX="8"
            refY="5"
            orient="auto">
      <polygon points="0 0,10 5,0 10" fill="#666"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="600" y="45" text-anchor="middle" class="title">
    AI 写作流程
  </text>

  <!-- 搜索资料 -->
  <rect class="box" x="40" y="100" width="180" height="60"/>
  <text class="text" x="130" y="130">搜索资料</text>

  <!-- 整理内容 -->
  <rect class="box" x="280" y="100" width="180" height="60"/>
  <text class="text" x="370" y="130">整理内容</text>

  <!-- 生成大纲 -->
  <rect class="box" x="520" y="100" width="180" height="60"/>
  <text class="text" x="610" y="130">生成大纲</text>

  <!-- 撰写文章 -->
  <rect class="box" x="760" y="100" width="180" height="60"/>
  <text class="text" x="850" y="130">撰写文章</text>

  <!-- 优化润色 -->
  <rect class="box" x="1000" y="100" width="180" height="60"/>
  <text class="text" x="1090" y="130">优化润色</text>

  <!-- 连线 -->
  <line class="line"
        x1="220"
        y1="130"
        x2="280"
        y2="130"
        marker-end="url(#arrow)"/>

  <line class="line"
        x1="460"
        y1="130"
        x2="520"
        y2="130"
        marker-end="url(#arrow)"/>

  <line class="line"
        x1="700"
        y1="130"
        x2="760"
        y2="130"
        marker-end="url(#arrow)"/>

  <line class="line"
        x1="940"
        y1="130"
        x2="1000"
        y2="130"
        marker-end="url(#arrow)"/>

</svg>