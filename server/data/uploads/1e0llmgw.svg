<svg width="500" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title {
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        font-size: 28px;
        font-weight: bold;
        fill: #333;
      }

      .box {
        fill: #ffffff;
        stroke: #333333;
        stroke-width: 2;
        rx: 12;
      }

      .text {
        font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        font-size: 20px;
        fill: #333333;
        text-anchor: middle;
        dominant-baseline: middle;
      }

      .arrow {
        stroke: #666666;
        stroke-width: 2;
        fill: none;
      }
    </style>

    <marker
      id="arrowhead"
      markerWidth="10"
      markerHeight="10"
      refX="5"
      refY="5"
      orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#666666"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="250" y="50" class="title" text-anchor="middle">
    DeepSeek
  </text>

  <!-- 用户 -->
  <rect class="box" x="150" y="90" width="200" height="60"/>
  <text class="text" x="250" y="120">用户</text>

  <!-- 箭头 -->
  <line class="arrow"
        x1="250" y1="150"
        x2="250" y2="200"
        marker-end="url(#arrowhead)"/>

  <!-- 提问 -->
  <rect class="box" x="150" y="210" width="200" height="60"/>
  <text class="text" x="250" y="240">提问</text>

  <!-- 箭头 -->
  <line class="arrow"
        x1="250" y1="270"
        x2="250" y2="320"
        marker-end="url(#arrowhead)"/>

  <!-- 获得答案 -->
  <rect class="box" x="150" y="330" width="200" height="60"/>
  <text class="text" x="250" y="360">获得答案</text>

  <!-- 箭头 -->
  <line class="arrow"
        x1="250" y1="390"
        x2="250" y2="440"
        marker-end="url(#arrowhead)"/>

  <!-- 结束 -->
  <rect class="box" x="150" y="450" width="200" height="60"/>
  <text class="text" x="250" y="480">结束</text>

</svg>