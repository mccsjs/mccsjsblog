<svg width="900" height="550" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title {
        font-family: "PingFang SC","Microsoft YaHei",sans-serif;
        font-size: 30px;
        font-weight: bold;
        fill: #333;
      }

      .node {
        fill: #ffffff;
        stroke: #333;
        stroke-width: 2;
        rx: 12;
      }

      .text {
        font-family: "PingFang SC","Microsoft YaHei",sans-serif;
        font-size: 18px;
        fill: #333;
        text-anchor: middle;
        dominant-baseline: middle;
      }

      .line {
        stroke: #666;
        stroke-width: 2;
        fill: none;
      }
    </style>

    <marker id="arrow"
            markerWidth="10"
            markerHeight="10"
            refX="8"
            refY="5"
            orient="auto">
      <polygon points="0 0,10 5,0 10" fill="#666"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="450" y="45" text-anchor="middle" class="title">
    Ai大模型
  </text>

  <!-- 用户目标 -->
  <rect class="node" x="350" y="80" width="200" height="60"/>
  <text class="text" x="450" y="110">用户目标</text>

  <!-- Agent -->
  <rect class="node" x="350" y="200" width="200" height="70"/>
  <text class="text" x="450" y="235">Agent</text>

  <!-- 连线 -->
  <line class="line"
        x1="450"
        y1="140"
        x2="450"
        y2="200"
        marker-end="url(#arrow)"/>

  <!-- 搜索信息 -->
  <rect class="node" x="80" y="340" width="180" height="60"/>
  <text class="text" x="170" y="370">搜索信息</text>

  <!-- 分析判断 -->
  <rect class="node" x="360" y="340" width="180" height="60"/>
  <text class="text" x="450" y="370">分析判断</text>

  <!-- 调用工具 -->
  <rect class="node" x="640" y="340" width="180" height="60"/>
  <text class="text" x="730" y="370">调用工具</text>

  <!-- Agent连接 -->
  <line class="line"
        x1="420"
        y1="270"
        x2="190"
        y2="340"
        marker-end="url(#arrow)"/>

  <line class="line"
        x1="450"
        y1="270"
        x2="450"
        y2="340"
        marker-end="url(#arrow)"/>

  <line class="line"
        x1="480"
        y1="270"
        x2="710"
        y2="340"
        marker-end="url(#arrow)"/>

  <!-- 完成任务 -->
  <rect class="node" x="350" y="460" width="200" height="60"/>
  <text class="text" x="450" y="490">完成任务</text>

  <!-- 汇聚 -->
  <line class="line"
        x1="170"
        y1="400"
        x2="420"
        y2="460"
        marker-end="url(#arrow)"/>

  <line class="line"
        x1="450"
        y1="400"
        x2="450"
        y2="460"
        marker-end="url(#arrow)"/>

  <line class="line"
        x1="730"
        y1="400"
        x2="480"
        y2="460"
        marker-end="url(#arrow)"/>
</svg>